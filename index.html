<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUSTOM Printer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:#eef2f5;color:#1a1a1a;min-height:100vh;padding:32px 20px}
.wrap{max-width:960px;margin:0 auto}
h1{font-size:24px;font-weight:600;color:#1a3a4a;letter-spacing:-.3px}
.subtitle{display:none}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;margin-top:0}
.stat{background:#fff;border:1px solid #c8d8e0;border-left:4px solid #1a3a4a;border-radius:12px;padding:16px 18px}
.stat-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:600;color:#1a3a4a}
.stat-sub{font-size:11px;color:#bbb;margin-top:3px}
.tab-row{display:flex;border-bottom:2px solid #c8d8e0;margin-bottom:20px}
.tab{padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#999;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Montserrat',sans-serif;transition:color .15s}
.tab:hover{color:#444}
.tab.active{color:#111;border-bottom:2px solid #1a3a4a}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.filters select{font-size:12px;padding:7px 10px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;color:#333;font-family:'Montserrat',sans-serif;cursor:pointer}
.btn-add{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;border:none;background:#1a3a4a;color:#fff;cursor:pointer;font-family:'Montserrat',sans-serif;white-space:nowrap}
.btn-add:hover{background:#2c5568}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;margin:1px 2px;white-space:nowrap}
.b-po{background:#dcfce7;color:#15803d}
.b-qt{background:#dbeafe;color:#1d4ed8}
.b-ls{background:#fee2e2;color:#b91c1c}
.b-ddp{background:#dbeafe;color:#1e40af}
.b-dap{background:#ede9fe;color:#6d28d9}
.b-exw{background:#fef3c7;color:#92400e}
.b-5y{background:#dcfce7;color:#166534}
.b-3y{background:#d1fae5;color:#065f46}
.b-2y{background:#ede9fe;color:#6d28d9}
.b-1y{background:#f3f4f6;color:#374151}
.card{background:#fff;border:1.5px solid #c8d8e0;border-radius:14px;margin-bottom:10px;overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 16px rgba(26,58,74,.12)}
.card-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;background:#f0f6f8}
.flag-icon{flex-shrink:0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cname{font-size:14px;font-weight:600;color:#1a3a4a}
.cmeta{font-size:12px;color:#5a7a8a;margin-top:2px}
.chevron{margin-left:auto;font-size:13px;color:#ccc;transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.card-body{border-top:2px solid #c8d8e0;display:none}
.card-body.open{display:block}
.tx{padding:18px 18px 14px 18px;border-bottom:3px solid #c8d8e0;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;background:#fff}
.tx:last-child{border-bottom:none}
.tx:hover{background:#f0f6f8}
.tx-date{font-size:11px;color:#444;margin-bottom:4px}
.tx-model{font-size:13px;font-weight:600;color:#1a3a4a}
.tx-proj{font-size:12px;color:#444;margin-top:3px}
.tx-pn{font-size:10px;color:#444;font-family:'DM Mono',monospace;margin-top:3px}
.tx-badges{margin-top:6px;display:flex;flex-wrap:wrap;gap:2px}
.tx-notes{margin-top:6px}
.tx-note{font-size:12.5px;color:#444;font-style:normal;line-height:1.7}
.tx-price{font-size:14px;font-weight:600;color:#1a3a4a;text-align:right;white-space:nowrap}
.tx-margin{font-size:11px;color:#aaa;text-align:right;margin-top:3px}
.cmp-wrap{background:#fff;border:1px solid #ebebeb;border-radius:14px;overflow:hidden}
.cmp-head{padding:14px 18px;border-bottom:1px solid #c8d8e0;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#e8f0f4}
.cmp-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#aaa}
.cmp-head select{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;color:#333;font-family:'Montserrat',sans-serif;font-weight:500}
.cmp-hint{font-size:11px;color:#bbb}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;background:#e8f0f4;border-bottom:1px solid #c8d8e0;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#1a3a4a}
td{padding:11px 16px;border-bottom:1px solid #f5f5f5;color:#333;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:#fafafa}
tr.exp-detail{display:none;background:#fafafa}
tr.exp-detail.open{display:table-row}
tr.exp-detail td{font-size:11px;color:#888;padding:8px 16px 12px 24px;font-style:italic;border-top:none}
.buying-card,.others-card{background:#fff;border:1.5px solid #c8d8e0;border-radius:14px;overflow:hidden}
.others-row{padding:14px 18px;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;align-items:start;gap:16px}
.others-row:last-child{border-bottom:none}
.others-row:hover{background:#f0f6f8}
.others-date{font-size:11px;color:#bbb;margin-bottom:3px}
.others-desc{font-size:13px;font-weight:500;color:#1a3a4a}
.others-sub{font-size:12px;color:#444;font-style:normal;margin-top:4px;line-height:1.6;max-width:600px}
.others-val{font-size:13px;font-weight:600;color:#1a3a4a;white-space:nowrap;text-align:right;flex-shrink:0}
.empty{padding:32px;text-align:center;font-size:13px;color:#bbb}
.country-group-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#1a3a4a;padding:18px 4px 8px;display:flex;align-items:center;gap:10px}
.country-group-label::after{content:"";flex:1;height:2px;background:linear-gradient(90deg,#1a3a4a 0%,#c8d8e0 100%);border-radius:2px}
.country-count{font-size:10px;color:#5a8a9a;font-weight:500;text-transform:none;letter-spacing:0}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:92%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:600;color:#111;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select,.form-group textarea{font-family:'Montserrat',sans-serif;font-size:13px;padding:9px 11px;border:1px solid #e0e0e0;border-radius:8px;color:#222;background:#fff;outline:none;transition:border .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#999}
.form-group textarea{resize:vertical;min-height:72px;line-height:1.5}
.form-hint{font-size:11px;color:#bbb;margin-top:2px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
.btn-cancel{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:500;padding:9px 18px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;color:#555;cursor:pointer}
.btn-cancel:hover{background:#f5f5f5}
.btn-save{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;padding:9px 18px;border-radius:8px;border:none;background:#1a3a4a;color:#fff;cursor:pointer}
.btn-save:hover{background:#2c5568}
.delete-btn{font-size:11px;color:#e57373;cursor:pointer;margin-left:8px;background:none;border:none;font-family:'Montserrat',sans-serif;padding:0}.delete-btn:hover{color:#c62828}
.proj-group-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:#fff3cd;color:#856404;border:1px solid #ffc107;margin-bottom:4px}
.proj-group-tag svg{width:10px;height:10px}
.expand-btn{font-size:11px;color:#1a3a4a;background:#e8f0f4;border:1px solid #c8d8e0;border-radius:6px;padding:3px 10px;cursor:pointer;margin-top:4px;font-family:"Montserrat",sans-serif;font-weight:500}.edit-btn{font-size:11px;color:#1a3a4a;cursor:pointer;margin-left:8px;background:none;border:none;font-family:'Montserrat',sans-serif;padding:0}.edit-btn:hover{color:#2c5568}
.delete-btn:hover{color:#c62828}
.proj-group-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:#fff3cd;color:#856404;border:1px solid #ffc107;margin-bottom:4px}
.proj-group-tag svg{width:10px;height:10px}
.expand-btn{font-size:11px;color:#1a3a4a;background:#e8f0f4;border:1px solid #c8d8e0;border-radius:6px;padding:3px 10px;cursor:pointer;margin-top:4px;font-family:"Montserrat",sans-serif;font-weight:500}
@media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr)}.tab{padding:8px 12px;font-size:12px}.form-grid{grid-template-columns:1fr}}
</style>
</head>

<div class="modal-overlay" id="modal-tx">
  <div class="modal">
    <div class="modal-title">Add transaction entry</div>
    <div class="form-grid">
      <div class="form-group"><label>Customer *</label><input id="f-customer" placeholder="e.g. Singapore Airlines" list="customer-list"><datalist id="customer-list"></datalist></div>
      <div class="form-group"><label>Country *</label><input id="f-country" placeholder="e.g. Singapore" list="country-list"><datalist id="country-list"></datalist></div>
      <div class="form-group"><label>Date</label><input id="f-date" placeholder="e.g. 15 Jan 2026"></div>
      <div class="form-group"><label>Status *</label><select id="f-status"><option value="PO">PO Confirmed</option><option value="Quotation">Quotation</option><option value="Lose">Lost Quote</option></select></div>
      <div class="form-group form-full"><label>Project name</label><input id="f-project" placeholder="e.g. Changi Airport T3"></div>
      <div class="form-group form-full"><label>Model *</label><input id="f-model" placeholder="e.g. TK180 Plastic" list="model-list"><datalist id="model-list"></datalist></div>
      <div class="form-group form-full"><label>Part number</label><input id="f-pn" placeholder="e.g. 911HL020600733" style="font-family:'DM Mono',monospace"></div>
      <div class="form-group"><label>Quantity</label><input id="f-qty" placeholder="e.g. 50 units"></div>
      <div class="form-group"><label>Unit price *</label><input id="f-price" type="number" placeholder="e.g. 1080"></div>
      <div class="form-group"><label>Currency *</label><select id="f-currency"><option value="USD">USD</option><option value="SGD">SGD</option><option value="RMB">RMB</option><option value="IDR">IDR</option><option value="EUR">EUR</option></select></div>
      <div class="form-group"><label>Buying price (USD)</label><input id="f-bp" type="number" placeholder="e.g. 287.59"><span class="form-hint">For margin calculation</span></div>
      <div class="form-group"><label>Shipping terms</label><select id="f-terms"><option value="">None</option><option value="DDP">DDP</option><option value="DAP">DAP</option><option value="EXW">EXW</option><option value="CIF">CIF</option><option value="FOB">FOB</option><option value="CIP">CIP</option><option value="CPT">CPT</option></select></div>
      <div class="form-group"><label>Warranty</label><select id="f-warranty"><option value="">Unknown / N/A</option><option value="1Y">1 Year</option><option value="2Y">2 Years</option><option value="3Y">3 Years</option><option value="5Y">5 Years</option></select></div>
      <div class="form-group form-full"><label>Notes</label><textarea id="f-notes" placeholder="One note per line."></textarea><span class="form-hint">Press Enter for multiple notes</span></div>
    </div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('modal-tx')">Cancel</button><button class="btn-save" onclick="sbSaveTx()">Save entry</button></div>
  </div>
</div>
<div class="modal-overlay" id="modal-buying">
  <div class="modal">
    <div class="modal-title">Add buying price</div>
    <div class="form-grid">
      <div class="form-group form-full"><label>Model name *</label><input id="b-model" placeholder="e.g. TK180 Metal Cutter AEA"></div>
      <div class="form-group form-full"><label>Part number</label><input id="b-pn" placeholder="e.g. 911HL011200733" style="font-family:'DM Mono',monospace"></div>
      <div class="form-group"><label>Price *</label><input id="b-price" type="number" placeholder="e.g. 369"></div>
      <div class="form-group"><label>Currency</label><select id="b-currency"><option value="USD">USD</option><option value="SGD">SGD</option><option value="EUR">EUR</option></select></div>
    </div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('modal-buying')">Cancel</button><button class="btn-save" onclick="sbSaveBuying()">Save entry</button></div>
  </div>
</div>
<div class="modal-overlay" id="modal-others">
  <div class="modal">
    <div class="modal-title">Add note / record</div>
    <div class="form-grid">
      <div class="form-group"><label>Date</label><input id="o-date" placeholder="e.g. 18 Nov 2025"></div>
      <div class="form-group"><label>Value / amount *</label><input id="o-value" placeholder="e.g. $12,000 USD"></div>
      <div class="form-group form-full"><label>Description *</label><input id="o-desc" placeholder="e.g. Service for Vietnam"></div>
      <div class="form-group form-full"><label>Sub-note / detail</label><textarea id="o-sub" placeholder="Any additional context or breakdown"></textarea></div>
    </div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('modal-others')">Cancel</button><button class="btn-save" onclick="sbSaveOther()">Save entry</button></div>
  </div>
</div>

function buildCustomerCard(name,txs){
  const country=txs[0].country,flagIcon=FLAGS[country]||"\u{1F310}";
  const cardKey=name+"__"+country,isOpen=expandedCards[cardKey];
  const pos=txs.filter(t=>t.status==="PO").length,qt=txs.filter(t=>t.status!=="PO").length;
  const sorted=[...txs].sort((a,b)=>{
      const aCombined=a.projectGroup&&a.model&&a.model.includes("+");
      const bCombined=b.projectGroup&&b.model&&b.model.includes("+");
      if(a.projectGroup&&b.projectGroup&&a.projectGroup===b.projectGroup){
        if(aCombined&&!bCombined)return -1;
        if(!aCombined&&bCombined)return 1;
      }
      return parseDV(b.date)-parseDV(a.date);
    });
  const rows=sorted.map(tx=>{
    const margin=tx.bp&&tx.currency==="USD"?tx.price-tx.bp:null;
    const mPct=margin?((margin/tx.price)*100).toFixed(1):null;
    const isCombined=tx.projectGroup&&tx.model&&tx.model.includes("+");
    const isSplit=tx.projectGroup&&tx.project&&(tx.project.includes("\u2014 ATB")||tx.project.includes("\u2014 BTP"));
    const grpId=tx.projectGroup?tx.projectGroup.replace(/[^a-zA-Z0-9]/g,"-"):"";
    const groupTag=(()=>{
      if(!tx.projectGroup)return "";
      if(isCombined)return "<div style='margin-bottom:5px'><button class='expand-btn' onclick='toggleGroup(\""+grpId+"\",this,event)'>\u25bc Show individual model entries</button></div>";
      if(isSplit)return "<div style='display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:#fff3cd;color:#856404;border:1px solid #ffc107;margin-bottom:5px'>&#128279; Part of: "+tx.projectGroup+"</div>";
      return "";
    })();
    const inner="<div class='tx'><div>"+
      groupTag+
      "<div class='tx-date'>"+(dDisplay(tx)?dDisplay(tx)+" \xb7 ":"")+bStatus(tx.status)+"</div>"+
      "<div class='tx-model'>"+tx.model+" &nbsp;&middot;&nbsp; "+tx.project+" &nbsp;&middot;&nbsp; "+tx.qty+"</div>"+
      (tx.pn?"<div class='tx-pn'>"+tx.pn+"</div>":"")+
      "<div class='tx-badges'>"+tx.terms.map(bTerm).join("")+bWarranty(tx.warranty)+"</div>"+
      (tx.notes.length?"<div class='tx-notes'>"+tx.notes.map(function(n){return "<div class='tx-note'>"+n+"</div>";}).join("")+"</div>":"")+
    "</div>"+
    "<div style='text-align:right;display:flex;flex-direction:column;min-height:100%'>"+
      (tx.dualPrice?
        "<div style='text-align:right;line-height:1.8'>"+
          "<span style='font-size:10px;color:#5a7a8a'>Cutter ARINC</span><br>"+
          "<span style='font-weight:600;font-size:13px;color:#1a3a4a'>"+tx.price.toLocaleString()+" "+tx.currency+"</span><br>"+
          "<span style='font-size:10px;color:#5a7a8a'>Non Cutter ARINC</span><br>"+
          "<span style='font-weight:600;font-size:13px;color:#1a3a4a'>"+tx.dualPrice.toLocaleString()+" "+tx.currency+"</span>"+
        "</div>"
      :
        "<div class='tx-price'>"+tx.price.toLocaleString()+" "+tx.currency+"</div>"
      )+
      (margin!==null?"<div class='tx-margin'>Margin: $"+margin.toFixed(0)+" ("+mPct+"%)</div>":"")+
      (()=>{
        const qm=(tx.qty||"").match(/[0-9]+/);const q=qm?parseInt(qm[0]):null;const printerTot=(q&&q>0)?tx.price*q:null;
        if(tx.totalOverride){
          const pTot=tx.printerTotalOverride||(printerTot&&!tx.noPrinterTotal?printerTot:null);
          if(pTot)return "<div style='font-size:11px;color:#1a3a4a;margin-top:6px;padding-top:5px;border-top:1px solid #c8d8e0'>Printer Total: <strong>"+pTot.toLocaleString()+" "+tx.currency+"</strong></div><div style='font-size:11px;color:#1a3a4a;margin-top:3px'>Project Total: <strong>"+tx.totalOverride.toLocaleString()+" "+tx.currency+"</strong></div>";
          return "<div style='font-size:11px;color:#1a3a4a;margin-top:6px;padding-top:5px;border-top:1px solid #c8d8e0'>Project Total: <strong>"+tx.totalOverride.toLocaleString()+" "+tx.currency+"</strong></div>";
        }
        if(!printerTot)return "";
        if(tx.noPrinterTotal)return "<div style='font-size:11px;color:#1a3a4a;margin-top:6px;padding-top:5px;border-top:1px solid #c8d8e0'>Project Total: <strong>"+printerTot.toLocaleString()+" "+tx.currency+"</strong></div>";
        return "<div style='font-size:11px;color:#1a3a4a;margin-top:6px;padding-top:5px;border-top:1px solid #c8d8e0'>Printer Total: <strong>"+printerTot.toLocaleString()+" "+tx.currency+"</strong></div><div style='font-size:11px;color:#1a3a4a;margin-top:3px'>Project Total: <strong>"+printerTot.toLocaleString()+" "+tx.currency+"</strong></div>";
      })()+
      "<div style='display:flex;justify-content:flex-end;padding-bottom:14px;margin-top:auto;padding-top:8px'>"+
        "<button class='edit-btn' onclick='editTx("+TX.indexOf(tx)+",event)'>Edit</button>"+
      "</div>"+
    "</div></div>";
    return isSplit?"<div class='grp-entry' data-group='"+grpId+"' style='display:none'>"+inner+"</div>":inner;
  }).join("");
  const sid=cardKey.replace(/[^a-zA-Z0-9]/g,"-");
  const escapedKey=cardKey.replace(/'/g,"\\'");
  return`<div class="card">
    <div class="card-header" onclick="toggleCard('${escapedKey}','${sid}')">
      <div class="flag-icon">${flagIcon}</div>
      <div style="flex:1"><div class="cname">${name}</div>
      <div class="cmeta">${country} \xb7 ${pos} PO${pos!==1?"s":""} \xb7 ${qt} quote${qt!==1?"s":""}</div></div>
      <div class="chevron ${isOpen?"open":""}" id="chev-${sid}">\u25be</div>
    </div>
    <div class="card-body ${isOpen?"open":""}" id="body-${sid}">${rows}</div>
  </div>`;
}
function renderCustomers(){
  const data=getFiltered(),sortMode=document.getElementById("fsort").value,groupMode="country";
  const byC={};
  data.forEach(t=>{const key=t.customer+"__"+t.country;if(!byC[key])byC[key]=[];byC[key].push(t);});
  if(!Object.keys(byC).length){document.getElementById("content").innerHTML='<div class="empty">No transactions match your filters.</div>';return;}
  let entries=Object.entries(byC).map(([key,txs])=>[txs[0].customer,txs,key]);
  if(sortMode==="name")entries.sort((a,b)=>a[0].localeCompare(b[0]));
  else if(sortMode==="name-desc")entries.sort((a,b)=>b[0].localeCompare(a[0]));
  else if(sortMode==="po-desc")entries.sort((a,b)=>b[1].filter(t=>t.status==="PO").length-a[1].filter(t=>t.status==="PO").length);
  else if(sortMode==="recent")entries.sort((a,b)=>Math.max(...b[1].map(t=>parseDV(t.date)))-Math.max(...a[1].map(t=>parseDV(t.date))));
  let html="";
  if(groupMode==="country"){
    const byCountry={};
    entries.forEach(([name,txs,key])=>{const c=txs[0].country||"Unknown";if(!byCountry[c])byCountry[c]=[];byCountry[c].push([name,txs,key]);});
    Object.entries(byCountry).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([country,list])=>{
      const f=flagImg(country,18);
      html+=`<div class="country-group-label">${f} ${country} <span class="country-count">${list.length} customer${list.length!==1?"s":""}</span></div>`;
      list.forEach(([name,txs])=>{html+=buildCustomerCard(name,txs);});
    });
  } else {
    entries.forEach(([name,txs])=>{html+=buildCustomerCard(name,txs);});
  }
  document.getElementById("content").innerHTML=html;
}

  btn.innerHTML=isHidden?"&#9650; Hide individual model entries":"&#9660; Show individual model entries";

async function loadFromDB(){
  showLoad("Connecting to database...");
  try{
    var res=await Promise.all([sbGet("transactions"),sbGet("buying_prices"),sbGet("others")]);
    var txRows=res[0],buyRows=res[1],othRows=res[2];
    if(txRows&&txRows.length>0){TX.length=0;txRows.forEach(function(r){TX.push(dbToTx(r));});}
    else{showLoad("First run — seeding database...");for(var i=0;i<TX.length;i++){var r=await sbInsert("transactions",txToDb(TX[i]));if(r&&r[0])TX[i]._id=r[0].id;}}
    if(buyRows&&buyRows.length>0){BUYING.length=0;buyRows.forEach(function(r){BUYING.push(dbToB(r));});}
    else{for(var j=0;j<BUYING.length;j++){var rb=await sbInsert("buying_prices",bToDb(BUYING[j]));if(rb&&rb[0])BUYING[j]._id=rb[0].id;}}
    if(othRows&&othRows.length>0){OTHERS.length=0;othRows.forEach(function(r){OTHERS.push(dbToO(r));});}
    else{for(var k=0;k<OTHERS.length;k++){var ro=await sbInsert("others",oToDb(OTHERS[k]));if(ro&&ro[0])OTHERS[k]._id=ro[0].id;}}
  }catch(e){console.error(e);alert("Could not connect to database. Using local data.");}
  hideLoad();refreshFilterOptions();renderStats();renderCustomers();
}
